name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

env:
  NX_DAEMON: "false"
  NX_CACHE_DIRECTORY: ".nx/cache"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .nx/cache
          key: ${{ runner.os }}-bun-nx-${{ hashFiles('bun.lock', 'package.json', 'nx.json', 'tsconfig.base.json', 'tsconfig.json', 'packages/*/package.json', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-bun-nx-

      - run: bun install --frozen-lockfile
      - run: bun run quality

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .nx/cache
          key: ${{ runner.os }}-bun-nx-${{ hashFiles('bun.lock', 'package.json', 'nx.json', 'tsconfig.base.json', 'tsconfig.json', 'packages/*/package.json', '.github/workflows/ci.yml') }}
          restore-keys: |
            ${{ runner.os }}-bun-nx-

      - run: bun install --frozen-lockfile
      - run: bun run unit

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun run integration
