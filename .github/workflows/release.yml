name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  BUN_VERSION: "1.3.11"
  NX_DAEMON: "false"
  NX_CACHE_DIRECTORY: ".nx/cache"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Update npm for Trusted Publishers
        run: npm install -g npm@latest

      - name: Install & Build
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: bun run release
          version: bun run version-packages
          commit: "chore: release packages"
          title: "chore: release packages"
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Create Git Tags for Published Packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          git fetch --tags

          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -c '.[]' | while read -r pkg; do
            NAME=$(echo "$pkg" | jq -r '.name')
            VERSION=$(echo "$pkg" | jq -r '.version')
            # Strip @mdcms/ scope for tag name
            SHORT_NAME="${NAME#@mdcms/}"
            TAG="${SHORT_NAME}-v${VERSION}"

            if git tag -l "${TAG}" | grep -q .; then
              echo "Tag ${TAG} already exists, skipping"
            else
              echo "Creating tag ${TAG} at ${GITHUB_SHA}"
              git tag "${TAG}" "${GITHUB_SHA}"
              git push origin "${TAG}"
            fi
          done
